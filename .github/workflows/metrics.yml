name: generate metrics

on:
  schedule:
    - cron: "30 */6 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/metrics.yml'

concurrency:
  group: metrics
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: core stats
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: terminal
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Jakarta
          config_padding: 0, 8 + 0%
          config_display: large
          extras_css: |
            body, .terminal { background: #282a36 !important; color: #f8f8f2 !important; }
            .terminal-header { background: #44475a !important; }
            .header-content { color: #f8f8f2 !important; }
            a, .user-login { color: #8be9fd !important; }
            .prompt { color: #50fa7b !important; }
            .command { color: #f8f8f2 !important; }
            .output { color: #f8f8f2 !important; }
            .terminal-footer { color: #6272a4 !important; }

      - name: languages + habits + lines
        uses: lowlighter/metrics@v3.34
        with:
          filename: metrics-stack.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: terminal
          base: ""
          config_timezone: Asia/Jakarta
          plugin_languages: yes
          plugin_languages_ignored: html, css, scss, tex, pdf
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_colors: "bd93f9, ff79c6, 8be9fd, 50fa7b, ffb86c, f1fa8c, ff5555, 6272a4"
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_trim: yes
          plugin_lines: yes
          plugin_lines_history_limit: 1
          plugin_lines_sections: base
          plugin_achievements: yes
          plugin_achievements_threshold: B
          plugin_achievements_secrets: yes
          plugin_achievements_display: compact
          plugin_achievements_limit: 0
          extras_css: |
            body, .terminal { background: #282a36 !important; color: #f8f8f2 !important; }
            .terminal-header { background: #44475a !important; }
            a, .user-login { color: #8be9fd !important; }
            .prompt { color: #50fa7b !important; }
            .bar { filter: hue-rotate(0deg) saturate(1.1); }
