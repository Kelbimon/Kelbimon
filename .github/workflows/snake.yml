name: generate snake animation

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/snake.yml'

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: generate snake with dracula palette
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=%23bd93f9&color_dots=%23282a36,%2344475a,%236272a4,%23bd93f9,%23ff79c6
            dist/snake-light.svg?color_snake=%23bd93f9&color_dots=%23f8f8f2,%23bd93f9,%23ff79c6,%238be9fd,%2350fa7b

      - name: push to output branch
        uses: crazy-max/ghaction-github-pages@v5
        with:
          target_branch: output
          build_dir: dist
          keep_history: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
